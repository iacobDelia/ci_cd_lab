apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/iacobdelia/go-simple-webserver@sha256:f890b0060928bc2243530d430a961abc51b68d8fa5da738b0b0710ef70898efa
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
